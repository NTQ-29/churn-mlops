name: MLOps Churn Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: {}
  schedule:
    - cron: "0 14 * * 1"   # 7 AM MST = 14:00 UTC

jobs:
  pipeline:
    name: Run End-to-End MLOps Pipeline
    runs-on: ubuntu-latest

    # Set up pipeline-wide environment variables
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      # Add your cloud provider credentials here if MLflow is hosted privately
      # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Adjusted to match your script requirements
          cache: 'pip'          # Speeds up subsequent runs by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Training & Feature Engineering
        run: |
          python train.py

      - name:  Run Shadow Evaluation (Staging vs Production)
        run: |
          python shadow_evaluate.py

      - name:  Run Promotion Gate & Registry Update
        id: promotion_gate
        run: |
          python promote_if_ready.py

      - name:  Trigger Cloud Deployment
        if: success()
        run: |
          echo "Model successfully promoted! Triggering deployment to cloud service..."
          # This will link directly to Step 4 of your roadmap (e.g., triggering a webhook, updating an image tag)

      - name:  Handle Workflow Failure Notification
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "MLOps Pipeline Failed",
              body: `The automated pipeline failed. Check the logs here: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
